version: 2
updates:
- package-ecosystem: docker
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directories:
  - '*'
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
- package-ecosystem: github-actions
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directory: /
- package-ecosystem: gomod
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directories:
  - '*'
- package-ecosystem: npm
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directories:
  - '*'
- package-ecosystem: nuget
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directories:
  - '*'
- package-ecosystem: pip
  schedule:
    interval: weekly
  cooldown:
    default-days: 7
  directories:
  - '*'
